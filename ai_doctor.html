<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>导诊助手小爱</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #1f2a3e;
            font-weight: 600;
        }
        .desc {
            color: #4a5b6e;
            margin-bottom: 2.5rem;
            border-left: 4px solid #0088ff;
            padding: 12px 16px;
            text-align: left;
            background: #f0f7ff;
            border-radius: 12px;
            line-height: 1.6;
        }
        .badge {
            background: #eef2ff;
            color: #1e40af;
            border-radius: 99px;
            padding: 4px 12px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .intro-text {
            color: #334155;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        hr {
            margin: 2rem 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        footer {
            font-size: 0.75rem;
            color: #7f8c9a;
            margin-top: 2rem;
        }
        /* 放大右下角聊天按钮，更显眼 */
        #coze-web-chat-launcher {
            width: 65px !important;
            height: 65px !important;
            bottom: 40px !important;
            right: 40px !important;
            box-shadow: 0 8px 25px rgba(0, 102, 255, 0.35) !important;
            border: 4px solid white !important;
            transition: transform 0.2s ease !important;
        }
        #coze-web-chat-launcher:hover {
            transform: scale(1.05); /* 鼠标悬浮轻微放大 */
        }
    </style>
</head>
<body>
<div class="container">
    <span class="badge">🤖 导诊助手小爱</span>
    <h1>欢迎使用智能体</h1>
    <div class="desc">
        💡 点击右下角按钮即可开启对话<br>
        📱 支持手机、电脑等多端访问<br>
        💬 点击聊天窗口右上角的【+】号按钮，可随时刷新对话，开启全新咨询
    </div>
    <p class="intro-text">根据您自身情况，与小爱展开健康咨询对话吧</p>
    <hr>
    <footer>
        由 Coze Web SDK 驱动 · 仅用于内部实验
    </footer>
</div>

<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
<script>
    function generateOneTimeIds() {
        const timestamp = new Date().getTime();
        const random = Math.random().toString(36).substring(2, 15);
        return {
            userId: `exp_user_${timestamp}_${random}`,
            sessionId: `exp_session_${timestamp}_${random}`
        };
    }

    function initChat() {
        const ids = generateOneTimeIds();
        localStorage.clear();
        sessionStorage.clear();

        new CozeWebSDK.WebChatClient({
            config: {
                bot_id: '7565910850109259782',
                user_id: ids.userId,
                session_id: ids.sessionId,
                region: 'cn'
            },
            componentProps: {
                title: '导诊助手小爱',
                showHistory: false,
                persistSession: false,
                enableMemory: false,
                chatInputPlaceholder: '请描述你的健康问题，我来为你解答...'
            },
            auth: {
                type: 'token',
                token: 'pat_P480XOok6B1jp001khLFtCjluEE9m3fCp7hdUUYrHyebFK6wmrdd2YzBr6o9BV9A',
                onRefreshToken: () => 'pat_P480XOok6B1jp001khLFtCjluEE9m3fCp7hdUUYrHyebFK6wmrdd2YzBr6o9BV9A'
            }
        });
    }

    // 页面加载完成后初始化
    window.onload = initChat;
</script>
</body>
</html>
